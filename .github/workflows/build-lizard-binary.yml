name: Build Lizard Binary

on:
  workflow_dispatch:
    inputs:
      lizard_version:
        description: 'Lizard version (leave empty for latest)'
        required: false
        default: ''
      environment:
        description: 'Build environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  BUILD_ENV: ${{ github.event.inputs.environment }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            suffix: ''
          - os: macos-latest
            name: macos-arm64
            suffix: ''
          - os: windows-latest
            name: windows-x86_64
            suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller lizard

      - name: Verify source
        shell: bash
        run: ls -la lizard.py && echo "lizard.py exists in root"

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --onefile \
                      --name "lizard-${{ matrix.name }}-${{ env.BUILD_ENV }}${{ matrix.suffix }}" \
                      --distpath "./dist" \
                      --workpath "./build" \
                      --specpath "./" \
                      lizard.py

          # 验证构建输出
          if [ ! -d "./dist" ]; then
            echo "ERROR: dist 目录未创建"
            exit 1
          fi
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-${{ matrix.name }}-${{ env.BUILD_ENV }}
          path: dist/

  package:
    needs: build
    runs-on: ubuntu-latest
    env:
      BUILD_ENV: ${{ github.event.inputs.environment }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        shell: bash
        run: |
          ls -la artifacts/
          echo "=== Contents of each artifact dir ==="
          for dir in artifacts/lizard-*; do
            echo "$dir:"
            ls -la "$dir/"
          done

      - name: Create distribution package
        shell: bash
        run: |
          mkdir -p dist

          # 检查制品是否存在再复制
          # artifact 内的文件名就是 artifact 名称本身
          for artifact in "lizard-linux-x86_64-${{ env.BUILD_ENV }}" "lizard-macos-arm64-${{ env.BUILD_ENV }}" "lizard-windows-x86_64-${{ env.BUILD_ENV }}"; do
            if [ "$artifact" = "lizard-windows-x86_64-${{ env.BUILD_ENV }}" ]; then
              check_file="artifacts/$artifact/$artifact.exe"
            else
              check_file="artifacts/$artifact/$artifact"
            fi
            if [ ! -f "$check_file" ]; then
              echo "ERROR: 缺少制品 $check_file"
              ls -la "artifacts/$artifact/"
              exit 1
            fi
          done

          cp artifacts/lizard-linux-x86_64-${{ env.BUILD_ENV }}/lizard-linux-x86_64-${{ env.BUILD_ENV }} dist/lizard
          cp artifacts/lizard-macos-arm64-${{ env.BUILD_ENV }}/lizard-macos-arm64-${{ env.BUILD_ENV }} dist/lizard
          cp artifacts/lizard-windows-x86_64-${{ env.BUILD_ENV }}/lizard-windows-x86_64-${{ env.BUILD_ENV }}.exe dist/lizard.exe
          ls -la dist/

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-all-platforms-${{ env.BUILD_ENV }}
          path: dist/
