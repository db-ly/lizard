name: Build Lizard Binary

on:
  workflow_dispatch:
    inputs:
      lizard_version:
        description: 'Lizard version (leave empty for latest)'
        required: false
        default: ''
      environment:
        description: 'Build environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            suffix: ''
          - os: macos-latest
            name: macos-arm64
            suffix: ''
          - os: windows-latest
            name: windows-x86_64
            suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements-build.txt

      - name: Verify source
        shell: bash
        run: ls -la lizard.py && echo "lizard.py exists in root"

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          pyinstaller --onefile \
                      --name "lizard-${{ matrix.name }}-${{ github.event.inputs.environment }}${{ matrix.suffix }}" \
                      --distpath "./dist" \
                      --workpath "./build" \
                      --specpath "./" \
                      lizard.py
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-${{ matrix.name }}-${{ github.event.inputs.environment }}
          path: dist/

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        shell: bash
        run: find artifacts -type f -ls

      - name: Verify artifacts exist
        shell: bash
        run: |
          ls -la artifacts/lizard-linux-x86_64-${{ github.event.inputs.environment }}/lizard || exit 1
          ls -la artifacts/lizard-macos-arm64-${{ github.event.inputs.environment }}/lizard || exit 1
          ls -la artifacts/lizard-windows-x86_64-${{ github.event.inputs.environment }}/lizard.exe || exit 1

      - name: Create distribution package
        shell: bash
        run: |
          mkdir -p dist
          cp artifacts/lizard-linux-x86_64-${{ github.event.inputs.environment }}/lizard dist/
          cp artifacts/lizard-macos-arm64-${{ github.event.inputs.environment }}/lizard dist/
          cp artifacts/lizard-windows-x86_64-${{ github.event.inputs.environment }}/lizard.exe dist/
          ls -la dist/

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-all-platforms-${{ github.event.inputs.environment }}
          path: dist/